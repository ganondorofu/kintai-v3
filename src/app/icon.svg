<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Clock circle -->
  <circle cx="240" cy="240" r="140" fill="none" stroke="white" stroke-width="24"/>
  <!-- Clock center dot -->
  <circle cx="240" cy="240" r="12" fill="white"/>
  <!-- Hour hand (pointing to ~10) -->
  <line x1="240" y1="240" x2="200" y2="170" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~2) -->
  <line x1="240" y1="240" x2="300" y2="190" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <!-- Checkmark circle -->
  <circle cx="370" cy="370" r="80" fill="#22C55E"/>
  <circle cx="370" cy="370" r="80" fill="none" stroke="white" stroke-width="8"/>
  <!-- Checkmark -->
  <polyline points="335,370 358,395 405,345" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
